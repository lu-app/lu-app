<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucidity | Enterprise Supply Chain Visibility Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cfc'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800' font-size='18'>L</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0a0b14; color: #e2e8f0; overflow-x: hidden; }
h1, h2, h3, h4, h5 { font-family: 'Outfit', sans-serif; }
::selection { background: #7c5cfc; color: white; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0b14; }
::-webkit-scrollbar-thumb { background: #1e1f36; border-radius: 3px; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(124,92,252,0.25)} 50%{box-shadow:0 0 40px rgba(124,92,252,0.25), 0 0 80px rgba(124,92,252,0.08)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes orbit { from{transform:rotate(0deg) translateX(140px) rotate(0deg)} to{transform:rotate(360deg) translateX(140px) rotate(-360deg)} }
@keyframes orbit2 { from{transform:rotate(120deg) translateX(180px) rotate(-120deg)} to{transform:rotate(480deg) translateX(180px) rotate(-480deg)} }
@keyframes orbit3 { from{transform:rotate(240deg) translateX(110px) rotate(-240deg)} to{transform:rotate(600deg) translateX(110px) rotate(-600deg)} }

.nav-link { position:relative; padding:8px 0; color:#94a3b8; cursor:pointer; font-size:14px; font-weight:500; transition:color 0.3s; letter-spacing:0.3px; background:none; border:none; font-family:'DM Sans',sans-serif; }
.nav-link:hover, .nav-link.active { color:#e2e8f0; }
.nav-link.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:#7c5cfc; border-radius:1px; }

.card { background:#12131f; border:1px solid #1e1f36; border-radius:16px; padding:32px; transition:all 0.4s ease; }
.card:hover { background:#1a1b2e; border-color:rgba(124,92,252,0.2); transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(124,92,252,0.08); }

.btn-primary { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; background:#7c5cfc; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; letter-spacing:0.3px; }
.btn-primary:hover { background:#6a4ae8; transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,92,252,0.25); }
.btn-outline { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; background:transparent; color:#7c5cfc; border:1.5px solid rgba(124,92,252,0.27); border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; }
.btn-outline:hover { border-color:#7c5cfc; background:rgba(124,92,252,0.07); }

.badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:100px; font-size:12px; font-weight:600; letter-spacing:0.5px; }
.stat-card { background:#161726; border:1px solid #1e1f36; border-radius:12px; padding:20px; }
.section { padding:100px 0; position:relative; z-index:1; }
.container { max-width:1200px; margin:0 auto; padding:0 24px; }

.tab-btn { padding:10px 20px; border-radius:10px; border:1px solid #1e1f36; background:transparent; color:#94a3b8; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; }
.tab-btn.active, .tab-btn:hover { background:rgba(124,92,252,0.08); border-color:rgba(124,92,252,0.27); color:#7c5cfc; }

.input { width:100%; padding:14px 18px; background:#161726; border:1px solid #1e1f36; border-radius:12px; color:#e2e8f0; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.3s; }
.input:focus { border-color:#7c5cfc; }
.input::placeholder { color:#64748b; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const B = {
  bg:"#0a0b14", bgCard:"#12131f", bgCardHover:"#1a1b2e", surface:"#161726",
  border:"#1e1f36", accent:"#7c5cfc", accentLight:"#a78bfa",
  accentGlow:"rgba(124,92,252,0.25)", accentGlow2:"rgba(124,92,252,0.08)",
  green:"#34d399", orange:"#f59e0b", red:"#ef4444", cyan:"#22d3ee",
  text:"#e2e8f0", textMuted:"#94a3b8", textDim:"#64748b",
};

const NAV_ITEMS = ["Home","Platform","ROI","Solutions","Contact"];

function AnimatedCounter({end,suffix="",prefix="",duration=2000}){
  const[count,setCount]=useState(0);const ref=useRef(null);const started=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){started.current=true;const start=performance.now();
        const tick=(now)=>{const p=Math.min((now-start)/duration,1);const ease=1-Math.pow(1-p,3);
          setCount(Math.floor(ease*end));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);}
    },{threshold:0.3});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[end,duration]);
  return <span ref={ref}>{prefix}{count.toLocaleString()}{suffix}</span>;
}

function FadeIn({children,delay=0,className=""}){
  const ref=useRef(null);const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVisible(true);},{threshold:0.15});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[]);
  return <div ref={ref} className={className} style={{opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(32px)",transition:`opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`}}>{children}</div>;
}

function GridBackground(){
  return <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden",pointerEvents:"none"}}>
    <div style={{position:"absolute",inset:0,backgroundImage:`linear-gradient(${B.border} 1px, transparent 1px), linear-gradient(90deg, ${B.border} 1px, transparent 1px)`,backgroundSize:"64px 64px",opacity:0.3}}/>
    <div style={{position:"absolute",top:"-30%",left:"50%",transform:"translateX(-50%)",width:"120vw",height:"120vw",borderRadius:"50%",background:`radial-gradient(circle, ${B.accentGlow} 0%, transparent 60%)`,opacity:0.4}}/>
    <div style={{position:"absolute",bottom:"-50%",right:"-20%",width:"80vw",height:"80vw",borderRadius:"50%",background:"radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 60%)"}}/>
  </div>;
}

function Sparkline({data,color,width=120,height=40}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const points=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*height}`).join(" ");
  return <svg width={width} height={height} style={{display:"block"}}>
    <defs><linearGradient id={`sg-${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={`0,${height} ${points} ${width},${height}`} fill={`url(#sg-${color.replace("#","")})`}/>
    <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function Donut({value,label,color,size=100}){
  const r=38,c=2*Math.PI*r;
  return <div style={{textAlign:"center"}}>
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r={r} fill="none" stroke={B.border} strokeWidth="8"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={`${c*value/100} ${c}`} strokeLinecap="round" transform="rotate(-90 50 50)" style={{transition:"stroke-dasharray 1.5s ease"}}/>
      <text x="50" y="50" textAnchor="middle" dy="0.35em" fill={B.text} fontSize="18" fontWeight="700">{value}%</text>
    </svg>
    <div style={{fontSize:12,color:B.textMuted,marginTop:4}}>{label}</div>
  </div>;
}

function ProgressBar({value,label,color}){
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:13,color:B.textMuted}}>{label}</span>
      <span style={{fontSize:13,color,fontWeight:600}}>{value}%</span>
    </div>
    <div style={{height:6,background:B.border,borderRadius:3,overflow:"hidden"}}>
      <div style={{width:`${value}%`,height:"100%",background:color,borderRadius:3,transition:"width 1.5s ease"}}/>
    </div>
  </div>;
}

const Ico={
  control:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accent} strokeWidth="1.5" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  track:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/><path d="M17.66 6.34l-2.83 2.83m-5.66 5.66l-2.83 2.83m0-11.32l2.83 2.83m5.66 5.66l2.83 2.83"/></svg>,
  analytics:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.cyan} strokeWidth="1.5" strokeLinecap="round"><path d="M3 20h18"/><path d="M6 16V10"/><path d="M10 16V6"/><path d="M14 16V12"/><path d="M18 16V8"/></svg>,
  claims:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.orange} strokeWidth="1.5" strokeLinecap="round"><path d="M9 12l2 2 4-4"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
  org:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accentLight} strokeWidth="1.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
  shield:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="1.5" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  globe:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accent} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>,
  zap:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.orange} strokeWidth="1.5" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  arrow:(c)=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c||B.accent} strokeWidth="2" strokeLinecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
  check:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  x:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={B.red} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};

function OrbitGraphic(){
  return <div style={{position:"relative",width:360,height:360,margin:"0 auto"}}>
    {[110,140,180].map((r,i)=><div key={i} style={{position:"absolute",top:"50%",left:"50%",width:r*2,height:r*2,borderRadius:"50%",border:`1px solid ${B.border}`,transform:"translate(-50%,-50%)"}}/>)}
    <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:110,height:110,borderRadius:"50%",background:`linear-gradient(135deg, ${B.accent}, ${B.accentLight})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 60px ${B.accentGlow}`,animation:"glow 3s ease-in-out infinite"}}>
      <span style={{fontFamily:"'Outfit'",fontWeight:700,fontSize:13,color:"white",letterSpacing:"0.5px"}}>Lucidity</span>
    </div>
    {[{label:"Track",color:B.green,anim:"orbit 12s linear infinite"},{label:"Analyze",color:B.cyan,anim:"orbit2 16s linear infinite"},{label:"Manage",color:B.orange,anim:"orbit3 20s linear infinite"}].map((n,i)=>
      <div key={i} style={{position:"absolute",top:"50%",left:"50%",width:0,height:0,animation:n.anim}}>
        <div style={{width:48,height:48,borderRadius:"50%",transform:"translate(-50%,-50%)",background:B.bgCard,border:`2px solid ${n.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:600,color:n.color,letterSpacing:0.5}}>{n.label}</div>
      </div>
    )}
  </div>;
}

function Nav({active,setActive}){
  const[scrolled,setScrolled]=useState(false);
  useEffect(()=>{const h=()=>setScrolled(window.scrollY>20);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h);},[]);
  return <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:scrolled?`${B.bg}ee`:"transparent",backdropFilter:scrolled?"blur(20px)":"none",borderBottom:scrolled?`1px solid ${B.border}`:"1px solid transparent",transition:"all 0.4s ease"}}>
    <div style={{maxWidth:1200,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:72}}>
      <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setActive(0)}>
        <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg, ${B.accent}, ${B.accentLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Outfit', sans-serif",fontWeight:800,fontSize:18,color:"white"}}>L</div>
        <span style={{fontFamily:"'Outfit', sans-serif",fontWeight:700,fontSize:20,color:B.text,letterSpacing:"-0.5px"}}>Lucidity</span>
      </div>
      <div style={{display:"flex",gap:32,alignItems:"center"}}>
        {NAV_ITEMS.map((item,i)=><button key={item} className={`nav-link${active===i?" active":""}`} onClick={()=>{setActive(i);window.scrollTo({top:0,behavior:"smooth"});}}>{item}</button>)}
        <button className="btn-primary" style={{padding:"10px 24px",fontSize:13}}>Request Demo</button>
      </div>
    </div>
  </nav>;
}

// HOME
// ═══════════════════════════════════════
function HomePage(){
  return <>
    <section style={{minHeight:"100vh",display:"flex",alignItems:"center",position:"relative",zIndex:1,paddingTop:72}}>
      <div className="container" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:80,alignItems:"center"}}>
        <div>
          <FadeIn><div className="badge" style={{background:B.accent+"15",color:B.accent,marginBottom:24}}><span style={{width:6,height:6,borderRadius:"50%",background:B.green,animation:"pulse 2s infinite"}}/>Enterprise Supply Chain Visibility Platform</div></FadeIn>
          <FadeIn delay={0.1}><h1 style={{fontSize:56,fontWeight:800,lineHeight:1.08,letterSpacing:"-2px",marginBottom:24}}>Total Visibility.<br/><span style={{background:`linear-gradient(135deg, ${B.accent}, ${B.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Complete Control.</span></h1></FadeIn>
          <FadeIn delay={0.2}><p style={{fontSize:18,color:B.textMuted,lineHeight:1.7,marginBottom:40,maxWidth:480}}>Real-time tracking and visibility across every shipment, carrier, and destination — paired with always-on performance analytics that give your team actionable intelligence the moment it matters.</p></FadeIn>
          <FadeIn delay={0.3}><div style={{display:"flex",gap:16,marginBottom:48}}><button className="btn-primary">Schedule a Demo {Ico.arrow("white")}</button></div></FadeIn>
          <FadeIn delay={0.4}><div style={{display:"flex",gap:40}}>
            {[{val:"100",suf:"%",label:"Real-Time Visibility"},{val:"30",suf:"%",label:"Operational Efficiency Gained"},{val:"40",suf:"%",label:"Fewer Claims"}].map((s,i)=><div key={i}><div style={{fontSize:28,fontWeight:800,fontFamily:"'Outfit'",color:B.text}}>{s.val}{s.suf}</div><div style={{fontSize:12,color:B.textDim,marginTop:2}}>{s.label}</div></div>)}
          </div></FadeIn>
        </div>
        <FadeIn delay={0.2}><OrbitGraphic/></FadeIn>
      </div>
    </section>

    <section className="section"><div className="container">
      <FadeIn><div style={{textAlign:"center",marginBottom:64}}>
        <div className="badge" style={{background:B.accent+"15",color:B.accent,margin:"0 auto 16px"}}>Core Capabilities</div>
        <h2 style={{fontSize:42,fontWeight:800,letterSpacing:"-1.5px",marginBottom:16}}>One Platform. Every Supply Chain Function.</h2>
        <p style={{fontSize:17,color:B.textMuted,maxWidth:620,margin:"0 auto"}}>Manage every mode of transportation, every carrier relationship, and every delivery across your entire network — unified in a single platform built for enterprise-scale logistics operations.</p>
      </div></FadeIn>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:24}}>
        {[
          {icon:Ico.control,title:"Powerful Operations Dashboard",desc:"Interactive delivery map with live pins, linehaul route visualization, region overlays, and real-time status grids. See every delivery across your network at a glance.",color:B.accent},
          {icon:Ico.track,title:"Carton-Level Tracking",desc:"Five-stage scan timeline from Loaded through Delivered. Full chain of custody with barcode-level precision at every retail store location across every node.",color:B.green},
          {icon:Ico.analytics,title:"Operations Analytics",desc:"Delivery accuracy metrics, scan progress breakdowns by store, carrier performance scorecards, and exception trend analysis across your entire network.",color:B.cyan},
          {icon:Ico.claims,title:"Claims Management",desc:"End-to-end OSD exception workflow — file, dispute, and resolve claims with full audit trails, bulk actions, and rolling 6-month performance statistics.",color:B.orange},
          {icon:Ico.org,title:"Organization Management",desc:"Role-based access control, carrier/shipper partner onboarding, market and region configuration with interactive map-based boundary management.",color:B.accentLight},
          {icon:Ico.shield,title:"Data Integration",desc:"Seamless connectivity through REST API integrations, EDI file handling, and SFTP automation for continuous data feeds — plus CSV upload as a flexible backup option.",color:B.green},
        ].map((cap,i)=><FadeIn key={i} delay={i*0.08}><div className="card" style={{height:"100%"}}>
          <div style={{width:52,height:52,borderRadius:14,background:`${cap.color}12`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>{cap.icon}</div>
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:10,letterSpacing:"-0.3px"}}>{cap.title}</h3>
          <p style={{fontSize:14,color:B.textMuted,lineHeight:1.7}}>{cap.desc}</p>
        </div></FadeIn>)}
      </div>
    </div></section>

    <section className="section" style={{background:`linear-gradient(180deg, ${B.surface}, ${B.bg})`}}><div className="container">
      <FadeIn><div style={{textAlign:"center",marginBottom:64}}>
        <h2 style={{fontSize:42,fontWeight:800,letterSpacing:"-1.5px",marginBottom:16}}>Enterprise-Grade Intelligence</h2>
        <p style={{fontSize:17,color:B.textMuted,maxWidth:550,margin:"0 auto"}}>Real-time metrics and analytics that scale with your operation.</p>
      </div></FadeIn>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:20}}>
        {[
          {label:"Shipments Tracked",val:2400000,suf:"+",spark:[20,35,28,45,52,48,65,72,68,85,92],color:B.accent},
          {label:"Claims Resolved",val:98,suf:"%",spark:[88,90,91,93,94,95,96,97,97,98,98],color:B.orange},
          {label:"Avg Scan Accuracy",val:99,suf:".7%",spark:[96,97,97,98,98,99,99,99,99,99,99],color:B.cyan},
        ].map((m,i)=><FadeIn key={i} delay={i*0.1}><div className="stat-card">
          <div style={{fontSize:12,color:B.textDim,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{m.label}</div>
          <div style={{fontSize:32,fontWeight:800,fontFamily:"'Outfit'",color:m.color,marginBottom:12}}><AnimatedCounter end={m.val} suffix={m.suf}/></div>
          <Sparkline data={m.spark} color={m.color}/>
        </div></FadeIn>)}
      </div>
    </div></section>

    <section className="section"><div className="container">
      <FadeIn><div style={{textAlign:"center",marginBottom:64}}>
        <h2 style={{fontSize:42,fontWeight:800,letterSpacing:"-1.5px",marginBottom:16}}>Dedicated Engineered Implementation</h2>
        <p style={{fontSize:17,color:B.textMuted,maxWidth:550,margin:"0 auto"}}>From initial discovery to full deployment, our implementation team engineers your Lucidity environment for maximum operational impact.</p>
      </div></FadeIn>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:32}}>
        {[
          {step:"01",title:"Discovery & Scoping",desc:"Map your carrier network, identify integration touchpoints, define KPIs and reporting requirements across all nodes."},
          {step:"02",title:"Network Configuration",desc:"Configure regions, markets, carrier partnerships, role-based access, and data integration mappings for your operation."},
          {step:"03",title:"Integration & Testing",desc:"Connect API feeds, configure EDI handling, validate data accuracy, and test scan workflows end-to-end across your distribution network."},
