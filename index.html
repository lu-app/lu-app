<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucidity | Enterprise Supply Chain Visibility Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cfc'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800' font-size='18'>L</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #0a0b14; color: #e2e8f0; overflow-x: hidden; }
#root { overflow-x: hidden; max-width: 100vw; }
h1, h2, h3, h4, h5 { font-family: 'Outfit', sans-serif; word-wrap: break-word; overflow-wrap: break-word; }
::selection { background: #7c5cfc; color: white; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0b14; }
::-webkit-scrollbar-thumb { background: #1e1f36; border-radius: 3px; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(124,92,252,0.25)} 50%{box-shadow:0 0 40px rgba(124,92,252,0.25), 0 0 80px rgba(124,92,252,0.08)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes orbit { from{transform:rotate(0deg) translateX(140px) rotate(0deg)} to{transform:rotate(360deg) translateX(140px) rotate(-360deg)} }
@keyframes orbit2 { from{transform:rotate(120deg) translateX(180px) rotate(-120deg)} to{transform:rotate(480deg) translateX(180px) rotate(-480deg)} }
@keyframes orbit3 { from{transform:rotate(240deg) translateX(110px) rotate(-240deg)} to{transform:rotate(600deg) translateX(110px) rotate(-600deg)} }

.nav-link { position:relative; padding:8px 0; color:#94a3b8; cursor:pointer; font-size:14px; font-weight:500; transition:color 0.3s; letter-spacing:0.3px; background:none; border:none; font-family:'DM Sans',sans-serif; }
.nav-link:hover, .nav-link.active { color:#e2e8f0; }
.nav-link.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:#7c5cfc; border-radius:1px; }

.card { background:#12131f; border:1px solid #1e1f36; border-radius:16px; padding:32px; transition:all 0.4s ease; }
.card:hover { background:#1a1b2e; border-color:rgba(124,92,252,0.2); transform:translateY(-4px); box-shadow:0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(124,92,252,0.08); }

.btn-primary { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; background:#7c5cfc; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; letter-spacing:0.3px; }
.btn-primary:hover { background:#6a4ae8; transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,92,252,0.25); }
.btn-outline { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; background:transparent; color:#7c5cfc; border:1.5px solid rgba(124,92,252,0.27); border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; }
.btn-outline:hover { border-color:#7c5cfc; background:rgba(124,92,252,0.07); }
.btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; background:transparent; color:#94a3b8; border:1px solid #1e1f36; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; }
.btn-ghost:hover { color:#e2e8f0; border-color:#94a3b8; }

.badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:100px; font-size:12px; font-weight:600; letter-spacing:0.5px; }
.stat-card { background:#161726; border:1px solid #1e1f36; border-radius:12px; padding:20px; }
.section { padding:100px 0; position:relative; z-index:1; }
.container { max-width:1200px; margin:0 auto; padding:0 24px; }

.tab-btn { padding:10px 20px; border-radius:10px; border:1px solid #1e1f36; background:transparent; color:#94a3b8; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.3s; font-family:'DM Sans',sans-serif; }
.tab-btn.active, .tab-btn:hover { background:rgba(124,92,252,0.08); border-color:rgba(124,92,252,0.27); color:#7c5cfc; }

.input { width:100%; padding:14px 18px; background:#161726; border:1px solid #1e1f36; border-radius:12px; color:#e2e8f0; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.3s; }
.input:focus { border-color:#7c5cfc; }
.input::placeholder { color:#64748b; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1024px) {
  .section { padding: 60px 0; }
  .card { padding: 24px; }
}
@media (max-width: 768px) {
  .section { padding: 48px 0; }
  .card { padding: 20px; border-radius: 12px; }
  .btn-primary, .btn-outline { padding: 12px 24px; font-size: 14px; }
  .stat-card { padding: 16px; }
}
@media (max-width: 480px) {
  .container { padding: 0 16px; }
  .section { padding: 40px 0; }
  .badge { font-size: 10px !important; }
}
@media (max-width: 380px) {
  .container { padding: 0 12px; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const B = {
  bg:"#0a0b14", bgCard:"#12131f", bgCardHover:"#1a1b2e", surface:"#161726",
  border:"#1e1f36", accent:"#7c5cfc", accentLight:"#a78bfa",
  accentGlow:"rgba(124,92,252,0.25)", accentGlow2:"rgba(124,92,252,0.08)",
  green:"#34d399", orange:"#f59e0b", red:"#ef4444", cyan:"#22d3ee",
  text:"#e2e8f0", textMuted:"#94a3b8", textDim:"#64748b",
};

const NAV_ITEMS = ["Home","Platform","ROI","Solutions","Contact"];
const CALENDLY = "https://calendly.com/roman-lu/30min";

// ─── Responsive hook ───
function useWindowWidth(){
  const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:1200);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return w;
}

function AnimatedCounter({end,suffix="",prefix="",duration=2000}){
  const[count,setCount]=useState(0);const ref=useRef(null);const started=useRef(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!started.current){started.current=true;const start=performance.now();
        const tick=(now)=>{const p=Math.min((now-start)/duration,1);const ease=1-Math.pow(1-p,3);
          setCount(Math.floor(ease*end));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);}
    },{threshold:0.3});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[end,duration]);
  return <span ref={ref}>{prefix}{count.toLocaleString()}{suffix}</span>;
}

function FadeIn({children,delay=0,className=""}){
  const ref=useRef(null);const[visible,setVisible]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVisible(true);},{threshold:0.1});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[]);
  return <div ref={ref} className={className} style={{opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(24px)",transition:`opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`}}>{children}</div>;
}

function GridBackground(){
  return <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden",pointerEvents:"none",width:"100%",height:"100%"}}>
    <div style={{position:"absolute",inset:0,backgroundImage:`linear-gradient(${B.border} 1px, transparent 1px), linear-gradient(90deg, ${B.border} 1px, transparent 1px)`,backgroundSize:"64px 64px",opacity:0.3}}/>
    <div style={{position:"absolute",top:"-30%",left:"-10%",width:"120%",height:"120%",borderRadius:"50%",background:`radial-gradient(circle, ${B.accentGlow} 0%, transparent 60%)`,opacity:0.4}}/>
  </div>;
}

function Sparkline({data,color,width=120,height=40}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const points=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*height}`).join(" ");
  return <svg width={width} height={height} style={{display:"block",maxWidth:"100%"}}>
    <defs><linearGradient id={`sg-${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={`0,${height} ${points} ${width},${height}`} fill={`url(#sg-${color.replace("#","")})`}/>
    <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function Donut({value,label,color,size=100}){
  const r=38,c=2*Math.PI*r;
  return <div style={{textAlign:"center"}}>
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx="50" cy="50" r={r} fill="none" stroke={B.border} strokeWidth="8"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={`${c*value/100} ${c}`} strokeLinecap="round" transform="rotate(-90 50 50)" style={{transition:"stroke-dasharray 1.5s ease"}}/>
      <text x="50" y="50" textAnchor="middle" dy="0.35em" fill={B.text} fontSize="18" fontWeight="700">{value}%</text>
    </svg>
    <div style={{fontSize:12,color:B.textMuted,marginTop:4}}>{label}</div>
  </div>;
}

function ProgressBar({value,label,color}){
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:13,color:B.textMuted}}>{label}</span>
      <span style={{fontSize:13,color,fontWeight:600}}>{value}%</span>
    </div>
    <div style={{height:6,background:B.border,borderRadius:3,overflow:"hidden"}}>
      <div style={{width:`${value}%`,height:"100%",background:color,borderRadius:3,transition:"width 1.5s ease"}}/>
    </div>
  </div>;
}

// ─── Responsive grid helper ───
function RGrid({cols="3",tabCols,mobCols="1",gap=24,children,style={}}){
  const w=useWindowWidth();
  const c = w<=480?(mobCols):w<=768?(tabCols||Math.min(2,parseInt(cols))):cols;
  return <div style={{display:"grid",gridTemplateColumns:`repeat(${c}, 1fr)`,gap,...style}}>{children}</div>;
}

const Ico={
  control:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accent} strokeWidth="1.5" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  track:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m10-10h-4M6 12H2"/><path d="M17.66 6.34l-2.83 2.83m-5.66 5.66l-2.83 2.83m0-11.32l2.83 2.83m5.66 5.66l2.83 2.83"/></svg>,
  analytics:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.cyan} strokeWidth="1.5" strokeLinecap="round"><path d="M3 20h18"/><path d="M6 16V10"/><path d="M10 16V6"/><path d="M14 16V12"/><path d="M18 16V8"/></svg>,
  claims:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.orange} strokeWidth="1.5" strokeLinecap="round"><path d="M9 12l2 2 4-4"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
  org:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accentLight} strokeWidth="1.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
  shield:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="1.5" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  globe:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.accent} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>,
  zap:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={B.orange} strokeWidth="1.5" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  arrow:(c)=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c||B.accent} strokeWidth="2" strokeLinecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
  check:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={B.green} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  x:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={B.red} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};

function OrbitGraphic(){
  const w=useWindowWidth();
  const s=w<=480?220:w<=768?280:360;
  const orbits=w<=480?[70,90,115]:[110,140,180];
  return <div style={{position:"relative",width:s,height:s,margin:"0 auto"}}>
    {orbits.map((r,i)=><div key={i} style={{position:"absolute",top:"50%",left:"50%",width:r*2,height:r*2,borderRadius:"50%",border:`1px solid ${B.border}`,transform:"translate(-50%,-50%)"}}/>)}
    <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:w<=480?80:110,height:w<=480?80:110,borderRadius:"50%",background:`linear-gradient(135deg, ${B.accent}, ${B.accentLight})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 60px ${B.accentGlow}`,animation:"glow 3s ease-in-out infinite"}}>
      <span style={{fontFamily:"'Outfit'",fontWeight:700,fontSize:w<=480?10:13,color:"white",letterSpacing:"0.5px"}}>Lucidity</span>
    </div>
    {[{label:"Track",color:B.green,anim:"orbit 12s linear infinite"},{label:"Analyze",color:B.cyan,anim:"orbit2 16s linear infinite"},{label:"Manage",color:B.orange,anim:"orbit3 20s linear infinite"}].map((n,i)=>
      <div key={i} style={{position:"absolute",top:"50%",left:"50%",width:0,height:0,animation:n.anim}}>
        <div style={{width:w<=480?36:48,height:w<=480?36:48,borderRadius:"50%",transform:"translate(-50%,-50%)",background:B.bgCard,border:`2px solid ${n.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:w<=480?7:9,fontWeight:600,color:n.color,letterSpacing:0.5}}>{n.label}</div>
      </div>
    )}
  </div>;
}

// ═══════════════════════════════════════
// NAV with mobile hamburger + Login
// ═══════════════════════════════════════
function Nav({active,setActive}){
  const[scrolled,setScrolled]=useState(false);
  const[menuOpen,setMenuOpen]=useState(false);
  const w=useWindowWidth();
  const isMobile=w<=768;
  useEffect(()=>{const h=()=>setScrolled(window.scrollY>20);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h);},[]);
  useEffect(()=>{if(!isMobile)setMenuOpen(false);},[isMobile]);

  return <>
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:scrolled||menuOpen?`${B.bg}ee`:"transparent",backdropFilter:scrolled||menuOpen?"blur(20px)":"none",borderBottom:scrolled?`1px solid ${B.border}`:"1px solid transparent",transition:"all 0.4s ease"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:isMobile?"0 16px":"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
        <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>{setActive(0);setMenuOpen(false);}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg, ${B.accent}, ${B.accentLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Outfit', sans-serif",fontWeight:800,fontSize:15,color:"white"}}>L</div>
          <span style={{fontFamily:"'Outfit', sans-serif",fontWeight:700,fontSize:18,color:B.text,letterSpacing:"-0.5px"}}>Lucidity</span>
        </div>

        {!isMobile ? (
          <div style={{display:"flex",gap:28,alignItems:"center"}}>
            {NAV_ITEMS.map((item,i)=><button key={item} className={`nav-link${active===i?" active":""}`} onClick={()=>{setActive(i);window.scrollTo({top:0,behavior:"smooth"});}}>{item}</button>)}
            <button className="btn-ghost" onClick={()=>window.open("https://lucidity.lu.app","_blank")}>Log In</button>
            <button className="btn-primary" style={{padding:"10px 24px",fontSize:13}} onClick={()=>window.open(CALENDLY,"_blank")}>Request Demo</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button className="btn-ghost" style={{padding:"8px 14px",fontSize:12}} onClick={()=>window.open("https://lucidity.lu.app","_blank")}>Log In</button>
            <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:"none",border:"none",cursor:"pointer",padding:8}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={B.text} strokeWidth="2" strokeLinecap="round">
                {menuOpen?<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>:<><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></>}
              </svg>
            </button>
          </div>
        )}
      </div>
    </nav>

    {/* Mobile menu overlay */}
    {isMobile && menuOpen && <div style={{position:"fixed",top:64,left:0,right:0,bottom:0,zIndex:99,background:`${B.bg}f5`,backdropFilter:"blur(20px)",display:"flex",flexDirection:"column",padding:"24px",gap:4}}>
      {NAV_ITEMS.map((item,i)=><button key={item} onClick={()=>{setActive(i);setMenuOpen(false);window.scrollTo({top:0,behavior:"smooth"});}} style={{background:active===i?`${B.accent}15`:"transparent",border:"none",borderRadius:12,padding:"16px 20px",textAlign:"left",fontSize:17,fontWeight:active===i?700:500,color:active===i?B.text:B.textMuted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.2s"}}>
        {item}
      </button>)}
      <div style={{marginTop:16,padding:"0 20px"}}><button className="btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={()=>{setMenuOpen(false);window.open(CALENDLY,"_blank");}}>Request Demo</button></div>
    </div>}
  </>;
}

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function HomePage(){
  const w=useWindowWidth();
  const isMob=w<=768;
  return <>
    <section style={{minHeight:isMob?"auto":"100vh",display:"flex",alignItems:"center",position:"relative",zIndex:1,paddingTop:isMob?80:72,paddingBottom:isMob?48:0}}>
      <div className="container" style={{display:"grid",gridTemplateColumns:isMob?"1fr":"1fr 1fr",gap:isMob?40:80,alignItems:"center"}}>
        <div style={{order:isMob?2:1}}>
          <FadeIn><div className="badge" style={{background:B.accent+"15",color:B.accent,marginBottom:20,fontSize:isMob?10:12}}><span style={{width:6,height:6,borderRadius:"50%",background:B.green,animation:"pulse 2s infinite"}}/>{isMob?"Enterprise Visibility Platform":"Enterprise Supply Chain Visibility Platform"}</div></FadeIn>
          <FadeIn delay={0.1}><h1 style={{fontSize:w<=480?30:isMob?36:w<=1024?44:56,fontWeight:800,lineHeight:1.08,letterSpacing:"-1.5px",marginBottom:20}}>Total Visibility.<br/><span style={{background:`linear-gradient(135deg, ${B.accent}, ${B.cyan})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Complete Control.</span></h1></FadeIn>
          <FadeIn delay={0.2}><p style={{fontSize:isMob?15:18,color:B.textMuted,lineHeight:1.7,marginBottom:32,maxWidth:480}}>Real-time tracking and visibility across every shipment, carrier, and destination — paired with always-on performance analytics that give your team actionable intelligence the moment it matters.</p></FadeIn>
          <FadeIn delay={0.3}><div style={{display:"flex",gap:16,marginBottom:36}}><button className="btn-primary" onClick={()=>window.open(CALENDLY,"_blank")}>Schedule a Demo {Ico.arrow("white")}</button></div></FadeIn>
          <FadeIn delay={0.4}><div style={{display:"grid",gridTemplateColumns:w<=480?"1fr 1fr":"repeat(3, auto)",gap:isMob?16:40}}>
            {[{val:"100",suf:"%",label:"Real-Time Visibility"},{val:"30",suf:"%",label:"Operational Efficiency Gained"},{val:"40",suf:"%",label:"Fewer Claims"}].map((s,i)=><div key={i}><div style={{fontSize:isMob?22:28,fontWeight:800,fontFamily:"'Outfit'",color:B.text}}>{s.val}{s.suf}</div><div style={{fontSize:11,color:B.textDim,marginTop:2}}>{s.label}</div></div>)}
